  <style>
    /* --- RESET & BASIC STYLE --- */
    body, html {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: white;
      /* Biarkan tinggi otomatis agar bisa di-scroll normal */
      height: auto; 
      width: 100%;
      overflow-x: hidden; /* Mencegah geser kanan-kiri yang tidak sengaja */
    }

    /* --- SECURITY & NO-DRAG CSS --- */
    .logo-item img, .logo-item span {
      user-select: none !important;
      -webkit-user-select: none !important;
      -webkit-user-drag: none !important;
      pointer-events: none; /* Supaya klik fokus ke tag <a> */
    }

    /* --- LAYOUT GRID (UTAMA) --- */
    .container {
      display: grid;
      /* Mengunci tampilan agar selalu kotak-kotak (Grid) menyamping */
      /* Min 150px untuk ukuran kotak paling kecil */
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      
      gap: 12px; 
      padding: 15px; 
      max-width: 100%;
      margin: 0 auto;
    }

    /* --- LOGO ITEM (LINK) --- */
    .logo-item {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #111;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid #222;
      transition: all 0.2s ease;
      outline: none; /* Menghapus garis biru default browser */
    }

    /* EFEK FOKUS REMOTE & HOVER MOUSE */
    .logo-item:focus, .logo-item:hover {
      border-color: #ffcc00; /* Warna highlight saat dipilih remote STB */
      background: #222;
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3);
    }

    /* --- GAMBAR LANDSCAPE --- */
    .logo-item img {
      width: 100%;
      /* Menggunakan aspect ratio agar proporsional di TV (16:9) */
      aspect-ratio: 16 / 9;
      object-fit: contain; 
      background-color: #000;
      border-radius: 8px;
    }

  /* --- TEKS --- */
    .logo-item span {
      display: block;
      margin-top: 8px;
      font-weight: bold;
      font-size: 13px;
      text-align: center;
      width: 100%;
      
      color: #ffffff !important; /* <--- TAMBAHKAN BARIS INI */
      
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Penyesuaian untuk layar HP sangat kecil */
    @media (max-width: 400px) {
      .container {
        grid-template-columns: repeat(2, 1fr); /* Tetap 2 kolom di HP kecil */
      }
    }
  </style>
  <script>
    /* --- PROTEKSI JAVASCRIPT --- */

    // 1. Blokir Klik Kanan (Context Menu)
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 2. Blokir Shortcut Keyboard (F12, Ctrl+Shift+I, Ctrl+U, dll)
    document.onkeydown = function(e) {
      if (e.keyCode == 123) { return false; } // F12
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } // Inspect
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } // Inspect
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } // Console
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } // View Source
      if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) { return false; } // Save
    };

    // 3. Blokir Drag-and-Drop
    document.addEventListener('dragstart', function(e) {
      e.preventDefault();
    });
  </script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const links = document.querySelectorAll('.play-link');
    const hiddenFrame = document.getElementById('hidden-frame');

    links.forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        
        let originalUrl = this.getAttribute('href').trim();
        
        // Normalisasi: pastikan selalu pakai https:// di intent (lebih stabil di kebanyakan player)
        // Tapi tetap support http:// yang sudah ada
        let cleanUrl = originalUrl;
        if (cleanUrl.startsWith('http://')) {
          cleanUrl = cleanUrl.replace('http://', 'https://'); // optional, kalau player lebih suka https
        }
        
        // Buat intent yang otomatis detect scheme asli (http atau https)
        // Cara paling reliable: pakai full URL setelah intent:// + scheme sesuai aslinya
        const scheme = cleanUrl.startsWith('https://') ? 'https' : 'http';
        const urlWithoutScheme = cleanUrl.replace(/^https?:\/\//, '');
        
        const intentString = `intent://${urlWithoutScheme}#Intent;scheme=${scheme};package=com.genuine.leone;end`;
        
        console.log('Intent dikirim:', intentString); // buat debug
        
        hiddenFrame.src = intentString;
      });
    });
  });

  // Proteksi keyboard tetap sama
  document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
      return false;
    }
  };
</script>
